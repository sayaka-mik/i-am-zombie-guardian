<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>못된 인간 1.1</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            margin: 0; background-color: #222; display: flex; 
            justify-content: center; align-items: center; height: 100vh;
            font-family: 'Malgun Gothic', sans-serif; overflow: hidden;
        }
        #app {
            width: 100%; max-width: 450px; aspect-ratio: 3 / 5;
            background-color: #fff; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.2s;
            border: 4px solid transparent;
        }

        #hud {
            height: 70px; background: #333; color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 13px; font-weight: bold; gap: 5px;
        }
        .stats-row { display: flex; gap: 20px; }
        .stat-val { color: #4bcffa; font-size: 16px; margin-left: 5px; }
        .death-val { color: #ff3f34; }
        .remain-val { color: #f1c40f; }

        #game-board {
            flex: 1; background: #f0f0f0; position: relative;
            display: grid;
            border: 4px solid #333;
            transition: border-color 0.2s;
        }
        
        .tile {
            border: 0.1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: center; align-items: center; 
            position: relative;
        }
        .tile-stone { background-color: #95a5a6; border-radius: 2px; }
        .tile-goal { background-color: #ff3f34; border-radius: 50%; border: 1px solid #fff; opacity: 0.8; }

        .char { user-select: none; position: absolute; transition: all 0.15s; }
        
        .aggro::after {
            content: '❗'; position: absolute; top: -10px; right: -5px;
            font-size: 8px; color: red; animation: blink 0.5s infinite;
        }
        
        .frozen { filter: grayscale(100%) brightness(150%); opacity: 0.7; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }

        .shake-red { animation: shake 0.2s; border-color: #ff3f34 !important; }
        .shake-green { animation: shake 0.2s; border-color: #05c46b !important; }
        .gold-flash { border-color: gold !important; box-shadow: 0 0 30px gold !important; }

        #controls { height: 140px; background: #eee; display: flex; padding: 15px; justify-content: space-between; align-items: stretch; gap: 10px; }
        .left-menu { display: flex; flex-direction: column; justify-content: center; gap: 8px; width: 30%; }
        .btn-menu { padding: 10px; background: #57606f; color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        
        .btn-grace {
            flex: 1; background: #f1c40f; color: #333; border: none; border-radius: 12px;
            font-size: 18px; font-weight: bold; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px #d4ac0d; transition: all 0.1s;
        }
        .btn-grace:active { transform: translateY(2px); box-shadow: 0 1px #d4ac0d; }
        .btn-grace:disabled { background: #bdc3c7; box-shadow: 0 4px #95a5a6; color: #7f8c8d; cursor: not-allowed; }
        .btn-sub-text { font-size: 10px; font-weight: normal; margin-top: 3px; color: #555; }
    </style>
</head>
<body>

<div id="app">
    <div id="hud">
        <div class="stats-row">
            <span>탈출 성공<span id="escape-count" class="stat-val">0</span></span>
            <span>사망 좀비<span id="death-count" class="stat-val death-val">0</span></span>
        </div>
        <div>필드 잔류 좀비: <span id="remain-count" class="remain-val">0</span> / 10</div>
    </div>

    <div id="game-board"></div>

    <div id="controls">
        <div class="left-menu">
            <button onclick="location.reload()" class="btn-menu">새 전장 생성</button>
            <div style="font-size: 10px; color: #666; text-align: center;">전원 탈출/사망 시<br>판갈이 진행</div>
        </div>
        <button id="btn-grace" class="btn-grace" onclick="castGrace()">
            은혜 베풀기 ⚡
            <span class="btn-sub-text">(F / 쿨타임 5초)</span>
        </button>
    </div>
</div>

<script>
    const GRID_SIZE = 20;
    const VISION_RANGE = 8; 
    const ENEMY_TICK = 300; 
    const ZOMBIE_TICK = 500; 
    const MAX_ZOMBIES = 10;
    const MAX_ENEMIES = 5;

    let zombies = [];
    let enemies = [];
    let stones = [];
    let goal = { x: -1, y: -1 };
    
    let totalEscapes = 0;
    let totalDeaths = 0;
    
    let enemyTimer = null;
    let zombieTimer = null;
    let isGameOver = false;

    let graceCooldown = false;
    let enemiesFrozen = false;

    function initGame() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        board.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
        board.style.gridTemplateRows = `repeat(${GRID_SIZE}, 1fr)`;
        
        const dynamicFontSize = Math.floor(400 / GRID_SIZE * 0.7); 

        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.fontSize = `${dynamicFontSize}px`; 
                tile.id = `tile-${x}-${y}`;
                board.appendChild(tile);
            }
        }
        resetGame(false);
    }

    function getRandomPos() {
        return { x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE) };
    }

    function isBlocked(x, y) {
        if (x < 0 || y < 0 || x >= GRID_SIZE || y >= GRID_SIZE) return true;
        if (stones.some(s => s.x === x && s.y === y)) return true;
        return false;
    }

    // BFS 길찾기
    function getNextStepBFS(startX, startY, targetX, targetY) {
        let queue = [{ x: startX, y: startY, path: [] }];
        let visited = new Set([`${startX},${startY}`]);
        let dirs = [[0,1], [0,-1], [1,0], [-1,0]]; 

        while (queue.length > 0) {
            let curr = queue.shift();
            if (curr.x === targetX && curr.y === targetY) {
                return curr.path.length > 0 ? curr.path[0] : null;
            }
            for (let d of dirs) {
                let nx = curr.x + d[0], ny = curr.y + d[1];
                if (!isBlocked(nx, ny) && !visited.has(`${nx},${ny}`)) {
                    visited.add(`${nx},${ny}`);
                    let step = curr.path.length === 0 ? {x: nx, y: ny} : curr.path[0];
                    queue.push({ x: nx, y: ny, path: [step] });
                }
            }
        }
        return null; 
    }

    function resetGame(fullReset) {
        if (fullReset) { totalEscapes = 0; totalDeaths = 0; updateHUD(); }
        isGameOver = false;
        
        const app = document.getElementById('app');
        app.className = '';
        
        zombies = [];
        enemies = [];
        stones = [];
        
        // 맵 생성 및 연결성 검사
        let attempts = 0;
        do {
            stones = [];
            let stoneFailsafe = 0;
            while (stones.length < 40 && stoneFailsafe < 1000) { // 맵이 커졌으므로 돌 증가
                let p = getRandomPos();
                if (!stones.some(s => s.x === p.x && s.y === p.y)) stones.push(p);
                stoneFailsafe++;
            }
            attempts++;
        } while (attempts < 100 && !isMapConnected(stones));

        // 목표 지점
        do { goal = getRandomPos(); } while (stones.some(s => s.x === goal.x && s.y === goal.y));

        // 좀비 10마리 배치
        for (let i = 0; i < MAX_ZOMBIES; i++) {
            let p;
            do { p = getRandomPos(); } while (stones.some(s => s.x === p.x && s.y === p.y) || (p.x === goal.x && p.y === goal.y));
            zombies.push({ x: p.x, y: p.y, lastPos: {x:-1, y:-1}, id: i });
        }
        
        // 적 5마리 배치
        for (let i = 0; i < MAX_ENEMIES; i++) {
            let p;
            do { p = getRandomPos(); } while (stones.some(s => s.x === p.x && s.y === p.y) || 
                                           zombies.some(z => Math.abs(z.x - p.x) + Math.abs(z.y - p.y) < 5));
            enemies.push({ x: p.x, y: p.y, isChasing: false });
        }

        render();
        updateHUD();

        clearInterval(enemyTimer);
        enemyTimer = setInterval(() => { if (!isGameOver) { moveEnemies(); checkCollision(); render(); } }, ENEMY_TICK);

        clearInterval(zombieTimer);
        zombieTimer = setInterval(() => { if (!isGameOver) { moveZombies(); checkCollision(); render(); } }, ZOMBIE_TICK);
    }

    function isMapConnected(stoneList) {
        let start = null;
        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                if (!stoneList.some(s => s.x === x && s.y === y)) { start = {x, y}; break; }
            }
            if(start) break;
        }
        if(!start) return false;
        let queue = [start], visited = new Set([`${start.x},${start.y}`]), emptyCount = (GRID_SIZE*GRID_SIZE) - stoneList.length;
        while(queue.length > 0) {
            let curr = queue.shift();
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(d => {
                let nx = curr.x+d[0], ny = curr.y+d[1];
                if(nx>=0 && nx<GRID_SIZE && ny>=0 && ny<GRID_SIZE && !stoneList.some(s => s.x===nx && s.y===ny) && !visited.has(`${nx},${ny}`)) {
                    visited.add(`${nx},${ny}`); queue.push({x:nx, y:ny});
                }
            });
        }
        return visited.size === emptyCount;
    }

    function render() {
        document.querySelectorAll('.tile').forEach(t => { t.className = 'tile'; t.innerHTML = ''; });
        const draw = (x, y, cls, html) => {
            const el = document.getElementById(`tile-${x}-${y}`);
            if(el) { if(cls) el.classList.add(cls); if(html) el.innerHTML += html; }
        };

        stones.forEach(s => draw(s.x, s.y, 'tile-stone'));
        draw(goal.x, goal.y, 'tile-goal');
        zombies.forEach(z => draw(z.x, z.y, null, `<span class="char" style="z-index:11;">🧟</span>`));
        enemies.forEach(en => {
            let cls = 'char';
            if(enemiesFrozen) cls += ' frozen'; else if(en.isChasing) cls += ' aggro';
            draw(en.x, en.y, null, `<span class="${cls}" style="z-index:12;">😎</span>`);
        });
    }

    function moveZombies() {
        zombies.forEach(z => {
            let closestEn = null, minDist = Infinity;
            enemies.forEach(en => {
                let d = Math.abs(z.x-en.x) + Math.abs(z.y-en.y);
                if(d < minDist) { minDist = d; closestEn = en; }
            });

            let next;
            if(!enemiesFrozen && minDist <= 3 && closestEn) {
                // 회피 로직
                let bestD = -1, moves = [];
                [[0,1],[0,-1],[1,0],[-1,0]].forEach(d => {
                    let nx = z.x+d[0], ny = z.y+d[1];
                    if(!isBlocked(nx, ny)) {
                        let eD = Math.abs(nx-closestEn.x) + Math.abs(ny-closestEn.y);
                        if(z.lastPos.x === nx && z.lastPos.y === ny) eD -= 0.1;
                        if(eD > bestD) { bestD = eD; moves = [{x:nx, y:ny}]; }
                        else if(eD === bestD) moves.push({x:nx, y:ny});
                    }
                });
                next = moves.length > 0 ? moves[Math.floor(Math.random()*moves.length)] : null;
            } else {
                next = getNextStepBFS(z.x, z.y, goal.x, goal.y);
            }

            if(next) { z.lastPos = {x:z.x, y:z.y}; z.x = next.x; z.y = next.y; }
        });
    }

    function moveEnemies() {
        if(enemiesFrozen) return;
        enemies.forEach(en => {
            let target = null, minDist = Infinity;
            zombies.forEach(z => {
                let d = Math.abs(en.x-z.x) + Math.abs(en.y-z.y);
                if(d < minDist) { minDist = d; target = z; }
            });

            if(target && minDist <= VISION_RANGE) {
                en.isChasing = true;
                let next = getNextStepBFS(en.x, en.y, target.x, target.y);
                if(next) { en.x = next.x; en.y = next.y; }
            } else {
                en.isChasing = false;
                let dirs = [[0,1],[0,-1],[1,0],[-1,0]].sort(() => Math.random()-0.5);
                for(let d of dirs) {
                    if(!isBlocked(en.x+d[0], en.y+d[1])) { en.x+=d[0]; en.y+=d[1]; break; }
                }
            }
        });
    }

    function checkCollision() {
        const app = document.getElementById('app');
        // 탈출 체크
        for(let i=zombies.length-1; i>=0; i--) {
            let z = zombies[i];
            if(z.x === goal.x && z.y === goal.y) {
                zombies.splice(i, 1);
                totalEscapes++;
                app.classList.add('shake-green'); setTimeout(() => app.classList.remove('shake-green'), 200);
            }
        }
        // 사망 체크
        if(!enemiesFrozen) {
            for(let i=zombies.length-1; i>=0; i--) {
                let z = zombies[i];
                if(enemies.some(en => en.x === z.x && en.y === z.y)) {
                    zombies.splice(i, 1);
                    totalDeaths++;
                    app.classList.add('shake-red'); setTimeout(() => app.classList.remove('shake-red'), 200);
                }
            }
        }

        updateHUD();
        if(zombies.length === 0 && !isGameOver) {
            isGameOver = true;
            setTimeout(() => resetGame(false), 800);
        }
    }

    function castGrace() {
        if(graceCooldown || isGameOver) return;
        graceCooldown = true;
        const btn = document.getElementById('btn-grace');
        btn.disabled = true;
        enemiesFrozen = true;
        document.getElementById('app').classList.add('gold-flash');
        setTimeout(() => { enemiesFrozen = false; document.getElementById('app').classList.remove('gold-flash'); render(); }, 2000);
        setTimeout(() => { graceCooldown = false; btn.disabled = false; }, 5000);
    }

    function updateHUD() {
        document.getElementById('escape-count').innerText = totalEscapes;
        document.getElementById('death-count').innerText = totalDeaths;
        document.getElementById('remain-count').innerText = zombies.length;
    }

    window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'f') castGrace(); });
    initGame();
</script>
</body>
</html>
